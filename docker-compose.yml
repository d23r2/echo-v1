services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    env_file:
      - ./backend/.env
    environment:
      CORS_ORIGINS: "http://localhost:5173,http://localhost:3000"

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
