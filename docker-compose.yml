services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    env_file:
      - ./backend/.env
    # ECHO Layer 0 — local-dev restart policy: come back after a crash or a
    # host reboot, but never loop forever if something is genuinely broken
    # (Docker's own backoff on "restart: unless-stopped" already avoids a
    # tight crash loop; "always" would fight a deliberate `docker compose
    # stop` on next daemon start, which isn't the right default here).
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
