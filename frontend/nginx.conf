server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Default is 1m — this proxies /api/, including file attachment uploads, to the
    # backend, so it must not be a stricter bottleneck than the backend's own
    # MAX_TOTAL_UPLOAD_BYTES (15MB) check in app/routers/chat.py.
    client_max_body_size 20m;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # nginx's bundled mime.types has no .webmanifest entry, so it would
    # otherwise fall back to application/octet-stream — Chrome's manifest
    # parser wants application/manifest+json.
    location = /manifest.webmanifest {
        default_type application/manifest+json;
    }

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
