name: Echo feature
description: Propose one testable Echo feature milestone
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: user_outcome
    attributes:
      label: User outcome
      description: What should the user be able to do? Give one concrete example.
    validations:
      required: true
  - type: textarea
    id: current_behavior
    attributes:
      label: Current behavior
      description: What happens now, and where is it implemented?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: List what is included and explicitly excluded.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Add observable, testable outcomes including failure behavior.
    validations:
      required: true
  - type: checkboxes
    id: safeguards
    attributes:
      label: Safeguards
      options:
        - label: Local-only operation remains supported
        - label: No silent paid-provider use
        - label: Privacy and memory effects were considered
        - label: The work can be completed as one reviewable milestone
